{% extends 'blog_app/base.html' %}
{% block title %}
    Post Details
{% endblock title %}
    

{% block content %}
    <div class="container mt-4">
        <!-- Back Button -->
        <a href="{% url 'post_list' %}" class="btn btn-light mb-4">
            ← Back
        </a>
        
        {% if post %}
            <div class="card p-4">
                <div class="card-title text-center">
                    <img src="{{post.image.url}}" style="height:400px;" alt="">
                    <br>
                    <br>
                    <h2>{{post.title}}</h2>
                </div>
                <div class="card-body ">
                    <p class="card-text">By Baishant Pachhai . {{post.created_at|date:"M d, Y"}}</p>
                    <p>{{post.content}}</p>
                    <a href="{% url 'post_delete' post.pk %}" class="btn btn-danger w-100">Delete</a>
                </div>
            </div>
        {% endif %}
            
    </div>

{% endblock content %}
