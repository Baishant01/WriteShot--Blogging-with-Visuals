{% load static %}
<nav class="navbar navbar-expand-lg bg-primary fixed-top">
  <div class="container">
    <!-- Logo -->
    <a class="navbar-brand text-white fw-bold p-0 logo"
       href="{% url 'post_list' %}">WriteShot</a>
    <!-- Hamburger Button (appears on mobile) -->
    <button class="navbar-toggler menu-btn"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarContent"
            aria-controls="navbarContent"
            aria-expanded="false"
            aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <!-- Collapsible Menu -->
    <div class="collapse navbar-collapse" id="navbarContent">
      <ul class="navbar-nav ms-auto align-items-lg-center">
        <!-- Posts Link (always visible) -->
        <li class="nav-item">
          <a class="nav-link text-white fw-bold px-3 py-2"
             href="{% url 'post_list' %}">Posts</a>
        </li>
        {% if user.is_authenticated %}
          <li class="nav-item">
            <a class="nav-link text-white fw-bold px-3 py-2"
               href="{% url 'post_create' %}">Create</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white fw-bold px-3 py-2"
               href="{% url 'my_post_list' %}">My Posts</a>
          </li>
          <li class="nav-item">
            <a href="{% url 'profile_view' %}">
              <div class="navbar-profile-container">
                <img src=" {% if user.profile.profile_pic %} {{ user.profile.profile_pic.url }} {% else %} /static/images/DefaultProfilePic.png {% endif %} "
                     height="30"
                     width="30"
                     alt="Profile"
                     class="object-fit-cover rounded-circle" />
              </div>
            </a>
          </li>
        {% else %}
          <!-- Guest Links -->
          <li class="nav-item">
            <a class="nav-link text-white fw-bold px-3 py-2"
               href="{% url 'login' %}">Login</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white fw-bold px-3 py-2"
               href="{% url 'register' %}">Sign Up</a>
          </li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>
