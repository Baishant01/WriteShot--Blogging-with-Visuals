{% load static %}
<nav class="navbar navbar-expand-lg bg-primary fixed-top"
     style="min-height: 70px">
  <div class="container">
    <!-- Logo -->
    <a class="navbar-brand text-white fw-bold p-0"
       href="/"
       style="font-size: 2rem;
              line-height: 1">WriteShot</a>
    <!-- Hamburger Button (appears on mobile) -->
    <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarContent"
            aria-controls="navbarContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
            style="border: none;
                   padding: 5px">
      <span class="navbar-toggler-icon" style="filter: invert(1)"></span>
    </button>
    <!-- Collapsible Menu -->
    <div class="collapse navbar-collapse" id="navbarContent">
      <ul class="navbar-nav ms-auto align-items-lg-center">
        <!-- Posts Link (always visible) -->
        <li class="nav-item">
          <a class="nav-link text-white fw-bold px-3 py-2"
             href="{% url 'post_list' %}">Posts</a>
        </li>
        {% if user.is_authenticated %}
          <li class="nav-item">
            <a class="nav-link text-white fw-bold px-3 py-2"
               href="{% url 'post_create' %}">Create</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white fw-bold px-3 py-2"
               href="{% url 'my_post_list' %}">My Posts</a>
          </li>
          <li class="nav-item">
            <a href="{% url 'profile_view' %}">
              <div class="d-flex justify-content-center align-items-center ms-lg-2"
                   style="background: white;
                          height: 35px;
                          width: 35px;
                          border-radius: 50%">
                <img src=" {% if user.profile.profile_pic %} {{ user.profile.profile_pic.url }} {% else %} /static/images/DefaultProfilePic.png {% endif %} "
                     alt="Profile"
                     style="border-radius: 50%;
                            height: 30px;
                            width: 30px;
                            object-fit: cover" />
              </div>
            </a>
          </li>
        {% else %}
          <!-- Guest Links -->
          <li class="nav-item">
            <a class="nav-link text-white fw-bold px-3 py-2"
               href="{% url 'login' %}">Login</a>
          </li>
          <li class="nav-item">
            <a class="nav-link text-white fw-bold px-3 py-2"
               href="{% url 'register' %}">Sign Up</a>
          </li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>
<style>
  body {
    padding-top: 70px;
  }

  /* Mobile adjustments */
  @media (max-width: 991px) {
    .navbar-collapse {
      background-color: #007bff;
      padding: 1rem;
      border-radius: 0 0 10px 10px;
      margin-top: 10px;
    }

    .nav-link {
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .nav-link:last-child {
      border-bottom: none;
    }

    /* Center profile picture on mobile */
    .navbar-nav .nav-item:has(div) {
      display: flex;
      justify-content: center;
      padding: 10px 0;
    }
  }
</style>
