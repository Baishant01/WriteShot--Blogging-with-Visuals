{% extends 'blog_app/base.html' %}
{% block title %}
    Post Form
{% endblock title %}
    

{% block content %}
<div class="container mt-4 p-0 rounded-4">
    <!-- Back Button -->
    <a href="{% url 'post_list' %}" class="btn btn-light mb-4">
        ← Back
    </a>
    <div class="card p-2">
        <form action="" class="form" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{form.as_p}}
            <div class="text-center">
                <button type="submit" class="btn btn-primary">Submit</button>
            </div>
        </form>
            
    </div>
</div>
{% endblock content %}
