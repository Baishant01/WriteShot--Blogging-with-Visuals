{% extends 'base.html' %}
{% block title %}
    Post Form
{% endblock title %}
{% block content %}
    <div class="container mt-4 p-0 rounded-4">
        <!-- Back Button -->
        <a href="{% url 'post_list' %}" class="btn btn-light mb-4">{% include "includes/back_btn.html" %}</a>
        <div class="card p-2">
            <form action="" class="form" method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {% if form.instance.pk %}
                    <p class="text-center bg-primary text-white fw-bold">Edit Post</p>
                {% else %}
                    <p class="text-center bg-primary text-white fw-bold">Create New Post</p>
                {% endif %}
                {{ form.as_p }}
                <div class="text-center">
                    <button type="submit" class="btn btn-primary">Submit</button>
                </div>
            </form>
        </div>
    </div>
{% endblock content %}
